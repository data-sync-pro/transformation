name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npx ng build --configuration production --output-path docs --base-href /

      - name: Create SPA 404 fallback
        # GitHub Pages serves 404.html for any unmatched path. Mirroring
        # index.html lets Angular bootstrap and parse the deep URL (e.g.
        # /home, /text/contains) instead of showing the default GH 404 page.
        run: Copy-Item docs/index.html docs/404.html -Force
        shell: pwsh

      - name: Disable Jekyll
        run: New-Item -Path docs/.nojekyll -ItemType File -Force
        shell: pwsh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
