<section class="form-section">
  <h3 class="form-section-title">Basic Info</h3>
  <div class="form-field">
    <label for="title">Title</label>
    <input
      id="title"
      type="text"
      class="form-input"
      [(ngModel)]="doc.title"
      (ngModelChange)="changed()"
    />
  </div>
  <div class="form-field">
    <label for="syntax">Syntax</label>
    <textarea
      id="syntax"
      class="form-textarea form-textarea-mono"
      rows="1"
      appAutosize="240"
      [(ngModel)]="doc.syntax"
      (ngModelChange)="changed()"
    ></textarea>
  </div>
</section>
